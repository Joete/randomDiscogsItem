<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discogs Random Pick</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />

  <style>
    :root {
      --ink:      #0e0b08;
      --cream:    #f5f0e8;
      --warm:     #ede5d5;
      --groove:   #1a1510;
      --label:    #c8a96e;
      --label2:   #8b4a2a;
      --red:      #c0392b;
      --muted:    rgba(14,11,8,.4);
      --border:   rgba(14,11,8,.12);
      --serif:    'Playfair Display', Georgia, serif;
      --mono:     'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--cream);
      color: var(--ink);
      font-family: var(--mono);
      display: grid;
      place-items: center;
      padding: 2rem 1rem 4rem;
      overflow-x: hidden;
    }

    /* ── grain texture ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)' opacity='0.055'/%3E%3C/svg%3E");
    }

    /* ── decorative lines ── */
    body::after {
      content: '';
      position: fixed;
      top: 0; left: 50%; transform: translateX(-50%);
      width: 1px; height: 100vh;
      background: linear-gradient(to bottom, transparent, var(--border) 20%, var(--border) 80%, transparent);
      pointer-events: none; z-index: 0;
    }

    .wrap {
      position: relative; z-index: 1;
      width: 100%; max-width: 680px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2.5rem 0 3rem;
      animation: fadeIn .8s ease both;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: .75rem;
      font-size: .65rem;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.2rem;
    }

    .eyebrow::before,
    .eyebrow::after {
      content: '';
      display: block;
      width: 40px; height: 1px;
      background: var(--border);
    }

    h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 6vw, 3.5rem);
      font-weight: 400;
      line-height: 1.1;
      color: var(--ink);
      letter-spacing: -.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--label2);
    }

    .tagline {
      margin-top: .9rem;
      font-size: .7rem;
      color: var(--muted);
      letter-spacing: .1em;
    }

    /* ── Main Card ── */
    .card {
      background: var(--groove);
      border-radius: 4px;
      overflow: hidden;
      box-shadow:
        0 2px 4px rgba(0,0,0,.08),
        0 8px 32px rgba(0,0,0,.18),
        0 32px 64px rgba(0,0,0,.1);
      animation: riseUp .7s .15s ease both;
    }

    /* ── Vinyl Record visual ── */
    .record-area {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      background: var(--groove);
      position: relative;
      min-height: 320px;
    }

    .vinyl-wrap {
      position: relative;
      width: 260px; height: 260px;
      flex-shrink: 0;
    }

    /* spinning record */
    .vinyl {
      width: 100%; height: 100%;
      border-radius: 50%;
      background:
        repeating-radial-gradient(
          circle at 50%,
          #111 0px, #1a1a1a 1px, #111 2px, #1c1c1c 3px
        );
      box-shadow:
        0 0 0 2px #333,
        inset 0 0 40px rgba(0,0,0,.8);
      animation: spin 8s linear infinite paused;
      position: relative;
    }

    .vinyl.playing { animation-play-state: running; }

    /* center label */
    .vinyl-label {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 96px; height: 96px;
      border-radius: 50%;
      background: var(--label);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 8px;
      box-shadow: inset 0 1px 3px rgba(0,0,0,.4);
    }

    .vinyl-label img {
      width: 100%; height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: none;
    }

    .vinyl-label img.loaded { display: block; }

    .label-text {
      font-family: var(--serif);
      font-size: .5rem;
      font-style: italic;
      color: var(--groove);
      line-height: 1.3;
      opacity: .8;
    }

    .vinyl-hole {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 12px; height: 12px;
      border-radius: 50%;
      background: #000;
      box-shadow: 0 0 0 1px #333;
      z-index: 2;
    }

    /* cover image (sleeve) */
    .sleeve {
      position: absolute;
      left: calc(50% + 60px);
      top: 50%; transform: translateY(-50%);
      width: 200px; height: 200px;
      border-radius: 3px;
      background: #2a2520;
      overflow: hidden;
      box-shadow:
        -4px 4px 12px rgba(0,0,0,.5),
        -1px 1px 0 rgba(255,255,255,.05);
      z-index: 1;
    }

    .sleeve img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .sleeve-placeholder {
      width: 100%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      opacity: .2;
    }

    /* ── Info section ── */
    .info {
      background: var(--cream);
      padding: 2rem 2.5rem 2.5rem;
      border-top: 3px solid var(--label);
    }

    .track-number {
      font-size: .6rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .6rem;
    }

    .album-artist {
      font-size: .8rem;
      letter-spacing: .08em;
      color: var(--label2);
      text-transform: uppercase;
      margin-bottom: .4rem;
      font-weight: 700;
    }

    .album-title {
      font-family: var(--serif);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 1.5rem;
    }

    /* metadata grid */
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: .5rem 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .meta-item { }
    .meta-key {
      font-size: .58rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .2rem;
    }
    .meta-val {
      font-size: .78rem;
      color: var(--ink);
      line-height: 1.4;
    }

    /* tags */
    .tags { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: 1.2rem; }
    .tag {
      font-size: .6rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: .25em .7em;
      color: var(--muted);
    }

    /* discogs link */
    .discogs-link {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      margin-top: 1.5rem;
      font-size: .68rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--label2);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .2s;
    }
    .discogs-link:hover { border-color: var(--label2); }

    /* ── Footer ── */
    footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid var(--border);
      animation: fadeIn .8s .3s ease both;
    }

    .endpoint {
      font-size: .65rem;
      color: var(--muted);
      letter-spacing: .05em;
    }
    .endpoint a {
      color: var(--label2);
      text-decoration: none;
      border-bottom: 1px solid rgba(139,74,42,.3);
    }

    .btn {
      background: var(--groove);
      color: var(--label);
      border: none;
      border-radius: 3px;
      padding: .6em 1.5em;
      font-family: var(--mono);
      font-size: .68rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background .2s, color .2s;
    }
    .btn:hover { background: var(--label2); color: var(--cream); }

    /* ── Loading / Error ── */
    .state-msg {
      text-align: center;
      padding: 4rem 2rem;
      background: var(--groove);
      color: rgba(245,240,232,.3);
      font-size: .8rem;
      letter-spacing: .1em;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; } to { opacity: 1; }
    }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── Responsive ── */
    @media (max-width: 560px) {
      .record-area { flex-direction: column; gap: 1.5rem; padding: 2rem 1rem; min-height: auto; }
      .sleeve { position: static; transform: none; width: 180px; height: 180px; }
      .vinyl-wrap { width: 180px; height: 180px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Discogs Collection</div>
      <h1>Today's <em>Random</em><br>Record Pick</h1>
      <p class="tagline">Täglich 3× automatisch neu gezogen · @Joete</p>
    </header>

    <div id="card">
      <div class="state-msg">▶ Lade result.json …</div>
    </div>

    <footer>
      <div class="endpoint">
        API:&nbsp;<a href="result.json" target="_blank">result.json</a>
      </div>
      <button class="btn" onclick="load()">↻ Neu laden</button>
    </footer>
  </div>

  <script>
    async function load() {
      document.getElementById('card').innerHTML =
        '<div class="state-msg">▶ Lade result.json …</div>';
      try {
        const res  = await fetch('result.json?t=' + Date.now());
        if (!res.ok) throw new Error(res.status);
        const data = await res.json();
        render(data);
      } catch (e) {
        document.getElementById('card').innerHTML =
          `<div class="state-msg" style="color:var(--red)">⚠ Fehler: ${e.message}</div>`;
      }
    }

    function render(data) {
      const r  = data.result;
      const ts = data.generated_at
        ? new Date(data.generated_at).toLocaleString('de-DE', { dateStyle: 'medium', timeStyle: 'short' })
        : '—';

      const genres = [...(r.genres || []), ...(r.styles || [])];
      const tagsHTML = genres.length
        ? genres.map(g => `<span class="tag">${g}</span>`).join('')
        : '';

      const coverSrc = r.cover_image || r.thumb || '';
      const sleeveHTML = coverSrc
        ? `<img src="${coverSrc}" alt="Cover" loading="lazy" />`
        : `<div class="sleeve-placeholder">♪</div>`;

      // Small cover for vinyl label
      const thumbSrc = r.thumb || r.cover_image || '';

      document.getElementById('card').innerHTML = `
        <div class="card">
          <div class="record-area">
            <div class="vinyl-wrap">
              <div class="vinyl playing" id="vinyl">
                <div class="vinyl-label">
                  ${thumbSrc
                    ? `<img src="${thumbSrc}" alt="" id="lbl-img" />`
                    : `<span class="label-text">${r.artist || '—'}</span>`}
                </div>
                <div class="vinyl-hole"></div>
              </div>
            </div>
            <div class="sleeve">${sleeveHTML}</div>
          </div>

          <div class="info">
            <div class="track-number">Generiert: ${ts} &nbsp;·&nbsp; ${data.total_in_collection || '?'} in Collection</div>
            <div class="album-artist">${r.artist || '—'}</div>
            <div class="album-title">${r.title || '—'}</div>

            <div class="meta-grid">
              ${r.year     ? `<div class="meta-item"><div class="meta-key">Jahr</div><div class="meta-val">${r.year}</div></div>` : ''}
              ${r.label    ? `<div class="meta-item"><div class="meta-key">Label</div><div class="meta-val">${r.label}</div></div>` : ''}
              ${r.discogs_id ? `<div class="meta-item"><div class="meta-key">Discogs ID</div><div class="meta-val">${r.discogs_id}</div></div>` : ''}
            </div>

            ${tagsHTML ? `<div class="tags">${tagsHTML}</div>` : ''}

            ${r.discogs_url
              ? `<a class="discogs-link" href="${r.discogs_url}" target="_blank" rel="noopener">
                  ↗ Auf Discogs ansehen
                </a>`
              : ''}
          </div>
        </div>`;

      // Mark label image loaded
      const lblImg = document.getElementById('lbl-img');
      if (lblImg) lblImg.onload = () => lblImg.classList.add('loaded');
    }

    load();
  </script>
</body>
</html>
